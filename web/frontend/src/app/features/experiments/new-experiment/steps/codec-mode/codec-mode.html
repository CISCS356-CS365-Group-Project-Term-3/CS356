<div class="step-content">
  <mat-card>
    <mat-card-content>
      <p class="section-label">Select a codec</p>
      <div class="options">
        @for (codec of availableCodecs; track codec.id) {
          <mat-card
            class="option-card"
            [class.selected]="formService.form.codecId === codec.id"
            (click)="selectCodec(codec)"
          >
            <div class="option-name">{{ codec.name }}</div>
          </mat-card>
        }
      </div>
    </mat-card-content>
  </mat-card>

  @if (formService.form.codecId !== null) {
    <mat-card>
      <mat-card-content>
        <p class="section-label">Select an encoder mode</p>
        <div class="options">
          @for (mode of availableModes; track mode.id) {
            <mat-card
              class="option-card"
              [class.selected]="formService.form.encoderModeId === mode.id"
              (click)="selectMode(mode)"
            >
              <div class="option-name">{{ mode.name }}</div>
            </mat-card>
          }
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>
