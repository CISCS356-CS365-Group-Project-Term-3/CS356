<div class="step-content">
  <mat-card>
    <mat-card-content>
      <mat-form-field appearance="outline" class="name-field">
        <mat-label>Experiment name</mat-label>
        <input
          type="text"
          matInput
          placeholder="e.g. HEVC baseline test"
          [(ngModel)]="formService.form.name"
        />
      </mat-form-field>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-content>
      <mat-form-field appearance="outline" class="name-field">
        <mat-label>Project type</mat-label>
        <mat-select [(ngModel)]="formService.form.projectTypeId">
          @for (projectType of projectTypes; track projectType.id) {
            <mat-option [value]="projectType.id">{{ projectType.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </mat-card-content>
  </mat-card>
</div>
