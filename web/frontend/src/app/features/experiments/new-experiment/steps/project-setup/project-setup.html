<div class="step-content">
  <mat-card>
    <mat-card-content>
      <mat-form-field appearance="outline" class="name-field">
        <mat-label>Experiment name</mat-label>
        <input
          type="text"
          matInput
          placeholder="e.g. HEVC baseline test"
          [(ngModel)]="formService.form.name"
        />
      </mat-form-field>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <mat-card-content>
      <p class="section-label">Select a project type</p>
      <div class="options">
        @for (projectType of projectTypes; track projectType.id) {
          <mat-card
            class="option-card"
            [class.selected]="formService.form.projectTypeId === projectType.id"
            (click)="formService.form.projectTypeId = projectType.id"
          >
            <div class="option-name">{{ projectType.name }}</div>
            <div class="option-desc">{{ projectTypeDescriptions[projectType.name] }}</div>
          </mat-card>
        }
      </div>
    </mat-card-content>
  </mat-card>
</div>
