<div class="step-content">
  <p class="step-description">
    Configure network emulation conditions for this experiment. All fields are optional.
  </p>

  <div class="fields-row">
    @for (field of fields; track field) {
      <div class="network-field">
        <mat-form-field appearance="outline" [color]="errors[field] ? 'warn' : 'primary'">
          <mat-label>{{ getLabel(field) }}</mat-label>
          <input
            matInput
            type="text"
            [value]="formService.form.networkEmulation[field] ?? ''"
            [placeholder]="getBoundsHint(field)"
            (blur)="onBlur(field, inputEl)"
            (input)="clearError(field)"
            #inputEl
          />
        </mat-form-field>
        @if (errors[field]) {
          <p class="field-error">{{ errors[field] }}</p>
        }
      </div>
    }
  </div>
</div>
