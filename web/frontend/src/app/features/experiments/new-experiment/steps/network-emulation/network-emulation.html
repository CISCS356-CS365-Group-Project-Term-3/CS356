<div class="step-content">
  <p class="step-description">
    Configure network emulation conditions for this experiment. All fields are optional.
  </p>

  <div class="fields-row">
    <mat-form-field appearance="outline">
      <mat-label>Packet Loss (%)</mat-label>
      <input
        matInput
        type="number"
        min="0"
        max="99.9"
        step="0.1"
        [(ngModel)]="formService.form.networkEmulation.packetLoss"
        placeholder="e.g. 4.5"
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Delay (ms)</mat-label>
      <input
        matInput
        type="number"
        min="0"
        max="999"
        [(ngModel)]="formService.form.networkEmulation.delay"
        placeholder="e.g. 80"
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Jitter (ms)</mat-label>
      <input
        matInput
        type="number"
        min="0"
        max="999"
        [(ngModel)]="formService.form.networkEmulation.jitter"
        placeholder="e.g. 25"
      />
    </mat-form-field>
  </div>
</div>
