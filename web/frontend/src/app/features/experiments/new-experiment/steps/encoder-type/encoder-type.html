<div class="step-content">
  <mat-card>
    <mat-card-content>
      <p class="section-label">Select an encoder type</p>
      <div class="options">
        @for (encoderType of encoderTypes; track encoderType.id) {
          <mat-card
            class="option-card"
            [class.selected]="formService.form.encoderTypeId === encoderType.id"
            (click)="select(encoderType)"
          >
            <div class="option-name">{{ encoderType.name }}</div>
            <div class="option-desc">{{ encoderTypeDescriptions[encoderType.id] }}</div>
          </mat-card>
        }
      </div>
    </mat-card-content>
  </mat-card>
</div>
