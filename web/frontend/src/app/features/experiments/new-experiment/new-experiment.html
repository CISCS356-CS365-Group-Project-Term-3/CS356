<div class="page-wrap">
  <div class="new-experiment-wrap">
    <div class="page-header">
      <h1>New Experiment</h1>
      <p>Configure and launch a new encoding experiment</p>
    </div>

    <mat-card appearance="outlined">
      <mat-stepper class="wizard-stepper" [linear]="true" #stepper>
        <ng-template matStepperIcon="edit">
          <mat-icon>check</mat-icon>
        </ng-template>
        <mat-step label="Project Setup" [completed]="isProjectSetupComplete()">
          <app-project-setup />
        </mat-step>

        <mat-step label="Encoders" [completed]="isEncodersComplete()">
          <app-encoders />
        </mat-step>

        <mat-step label="Sequences" [completed]="isSequencesComplete()">
          <app-sequences />
        </mat-step>
        <!-- 
        <mat-step label="Scalability">
          <p>Coming soon</p>
        </mat-step>

        <mat-step label="Network">
          <p>Coming soon</p>
        </mat-step> -->

        <!-- <mat-step label="Analysis">
          <p>Coming soon</p>
        </mat-step>

        <mat-step label="Outputs">
          <p>Coming soon</p>
        </mat-step> -->

        <mat-step label="Review">
          <app-review />
        </mat-step>
      </mat-stepper>
      <div class="actions">
        <span class="step-counter"
          >Step {{ stepper.selectedIndex + 1 }} of {{ stepper.steps.length }}</span
        >
        <div class="action-buttons">
          <button
            mat-stroked-button
            [routerLink]="stepper.selectedIndex === 0 ? '/experiments' : null"
            (click)="stepper.previous()"
          >
            {{ stepper.selectedIndex === 0 ? 'Cancel' : 'Back' }}
          </button>
          <button
            mat-raised-button
            color="primary"
            (click)="stepper.selectedIndex === stepper.steps.length - 1 ? submit() : stepper.next()"
            [disabled]="!canProceed(stepper.selectedIndex)"
          >
            {{ stepper.selectedIndex === stepper.steps.length - 1 ? 'Submit' : 'Next' }}
          </button>
        </div>
      </div>
    </mat-card>
  </div>
</div>
