<h2 mat-dialog-title>
  Add Encoder Type
</h2>

<mat-dialog-content>
  <p class="dialog-description">
    Create a new encoder type. New encoder types are added as inactive until enabled.
  </p>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>
      Encoder Type Name
    </mat-label>

    <input
      matInput
      [(ngModel)]="name"
      maxlength="100">

    <mat-hint>
      Example: Scalable Encoder
    </mat-hint>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>
      Description (optional)
    </mat-label>

    <textarea
      matInput
      [(ngModel)]="description"
      rows="4"
      maxlength="250">
    </textarea>

    <mat-hint>
      Optional additional details about this encoder type.
    </mat-hint>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    mat-button
    (click)="cancel()">
    Cancel
  </button>

  <button
    mat-flat-button
    color="primary"
    [disabled]="name.trim().length === 0"
    (click)="save()">
    Add Encoder Type
  </button>
</mat-dialog-actions>
