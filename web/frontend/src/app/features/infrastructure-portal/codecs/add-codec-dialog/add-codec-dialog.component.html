<h2 mat-dialog-title>
  Add Codec
</h2>

<mat-dialog-content>

  <p class="dialog-description">
    Add a codec to the Infrastructure Portal.
    Unsupported codecs can be stored but cannot currently be enabled for
    researchers until they are supported by the Experiments Engine.
  </p>

  <mat-form-field appearance="outline">

    <mat-label>
      Codec Name
    </mat-label>

    <input
      matInput
      [(ngModel)]="name"
      maxlength="100">

    <mat-hint>
      Example: H.264
    </mat-hint>

  </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button
    mat-button
    (click)="cancel()">
    Cancel
  </button>

  <button
    mat-flat-button
    color="primary"
    [disabled]="name.trim().length === 0"
    (click)="save()">
    Add Codec
  </button>

</mat-dialog-actions>
