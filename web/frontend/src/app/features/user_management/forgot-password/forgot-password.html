<div class="page-wrap">
  <div class="page-header">
    <h1>Reset your password</h1>
    <p>Enter your email to receive a link to reset your password</p>
  </div>
  <form [formGroup]="emailForm" (ngSubmit)="sendEmail()">
    <div class="form-element">
      <mat-form-field appearance="outline">
        <mat-label>Enter your email</mat-label>
        <input
          matInput
          formControlName="email"
          (blur)="updateEmailErrorMessage()"
          required
        />
        @if (emailForm.get('email')?.invalid) {
          <mat-error>{{emailErrorMessage()}}</mat-error>
        }
      </mat-form-field>
    </div>


    <div class="form-element">
      <div class="example-button-row">
        <button [disabled]="emailForm.invalid" matButton="filled" type="submit">Send reset link</button>
      </div>
    </div>
    @if (successMessage()) {
      <p>{{ successMessage() }}</p>
    }
  </form>
</div>
