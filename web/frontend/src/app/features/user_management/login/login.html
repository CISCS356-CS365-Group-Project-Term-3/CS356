<div class="page-wrap">
  <div class="page-header">
    <h1>Log into your account</h1>
    <p>Enter your details to access your account</p>
  </div>
  <form [formGroup]="loginForm" (ngSubmit)="submitDetails()">

    <div class="form-element">

      <mat-form-field appearance="outline">

        <mat-label>Enter a username</mat-label>
        <input
          matInput
          formControlName="username"
          (blur)="updateUsernameErrorMessage()"
          required
        />
        @if (loginForm.get('username')?.invalid) {
        <mat-error>{{usernameErrorMessage()}}</mat-error>
        }
      </mat-form-field>
    </div>

    <div class="form-element">
      <mat-form-field appearance="outline">
        <mat-label>Enter a password</mat-label>
        <input matInput formControlName="password" (blur)="updatePasswordErrorMessage()" [type]="hide() ? 'password' : 'text'" required />
        @if (loginForm.get('password')?.invalid) {
        <mat-error>{{passwordErrorMessage()}}</mat-error>
        }
        <mat-hint class="password-reset-link" routerLink="/forgot-password">
        <a>Forgot password?</a>
        </mat-hint>
        <button
          matIconButton
          matSuffix
          (click)="clickPasswordEvent($event)"
          [attr.aria-label]="'Hide password'"
          [attr.aria-pressed]="hide()"
        >
          <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
      </mat-form-field>
    </div>

    <div class="form-element">
      <div class="example-button-row">
        <button [disabled]="loginForm.invalid" matButton="filled" type="submit">Log in</button>
      </div>
    </div>
  </form>
</div>
