services:
  web:
    build: ./web
    ports:
      - "8080:8080"

  engine:
    privileged: true
    build: ./experiments_engine
    depends_on:
      queue: 
        condition: service_healthy
    volumes:
      - ./config_map.json:/config_map.json:ro
      - ./resources:/resources
    environment:
      CONFIG_MAP_PATH: /config_map.json
      QUEUE_NAME: experiment_queue
      QUEUE_CONTAINER: queue
      OUTPUT_MONGO_URI: mongodb://admin:admin@mongo:27017/
      OUTPUT_MONGO_DB_NAME: experiment_storage
      INPUT_DIR: /resources/input
      TEMP_DIR: /tmp
      OUTPUT_DIR: /resources/output
  
  experiment-management:
    build: ./experiment_management
    profiles:
      - experiment-management
    depends_on:
      queue:
        condition: service_healthy
      experiments_db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - QUEUE_NAME=experiment_queue
      - QUEUE_CONTAINER=queue
      - DB_HOST=experiments_db
      - DB_NAME=experiments_management
      - DB_USER=postgres
      - DB_PASSWORD=password

  queue:
    image: rabbitmq:4.3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672" 
    healthcheck:
      # use the flag --erlang-cookie if setting the erlang 
      # cookie was necessary (comment by red-riding-hood)
      # test: rabbitmq-diagnostics -q ping --erlang-cookie "mycookie"
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7 
    profiles:
      - mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0.2
    profiles:
      - mongo
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_URL=mongodb://admin:admin@mongo:27017/
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo
    restart: unless-stopped

  experiments_db:
    image: postgres:16
    container_name: experiments-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: experiments_management
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mongo_data:
  postgres_data:
