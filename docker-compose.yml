services:
  engine:
    privileged: true
    build: ./experiments_engine
    depends_on:
      queue: 
        condition: service_healthy
    volumes:
      - ./config_map.json:/config_map.json:ro
      - ./resources:/resources
    environment:
      CONFIG_MAP_PATH: /config_map.json
      QUEUE_NAME: experiment_queue
      QUEUE_CONTAINER: queue
      OUTPUT_MONGO_URI: mongodb://admin:admin@mongo:27017/
      OUTPUT_MONGO_DB_NAME: experiment_storage
      INPUT_DIR: /resources/input
      TEMP_DIR: /tmp
      OUTPUT_DIR: /resources/output

  queue:
    image: rabbitmq:4.3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672" 
    healthcheck:
      # use the flag --erlang-cookie if setting the erlang 
      # cookie was necessary (comment by red-riding-hood)
      # test: rabbitmq-diagnostics -q ping --erlang-cookie "mycookie"
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongo:
    image: mongo:7 
    profiles:
      - mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0.2
    profiles:
      - mongo
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_URL=mongodb://admin:admin@mongo:27017/
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
